server {
    listen 80;

    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        # Tenta servir o arquivo, se não achar, manda para o index.html (essencial para React Router)
        try_files $uri $uri/ /index.html;
    }

    # Proxy reverso para a API (opcional, mas ajuda a evitar problemas de CORS)
    location /api/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}