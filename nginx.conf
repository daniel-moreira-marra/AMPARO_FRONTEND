server {
    listen 80;

    # Resolver para VPC AWS (10.0.0.2) e Docker Compose (127.0.0.11)
    resolver 10.0.0.2 127.0.0.11 valid=30s;

    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        # Tenta servir o arquivo, se não achar, manda para o index.html (essencial para React Router)
        try_files $uri $uri/ /index.html;
    }

    # Proxy reverso para a API (opcional, mas ajuda a evitar problemas de CORS)
    location /api/ {
        set $backend_upstream http://backend:8000;
        proxy_pass $backend_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}